name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
            label: macOS-arm64
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            bun_target: bun-darwin-x64
            label: macOS-x64
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
            label: Linux-x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # Build the sidecar server binary
      - name: Build sidecar server
        run: |
          cd server
          bun install
          bun build --compile --minify --target=${{ matrix.bun_target }} index.ts --outfile ../src-tauri/binaries/chat-server-${{ matrix.rust_target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lil-gpt-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.exe
          retention-days: 7
